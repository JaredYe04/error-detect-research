# Experiment matrix configuration
modes:
  baselines: [B0, B1, B2]
  method: [M]
  ablations: [A1, A2, A3]

defaults:
  repeats: 2
  seed: 42
  model: ecnu-plus
  temperature: 0.2
  max_attempts: 3

sensitivity:
  temperatures: [0.0, 0.2, 0.5, 0.8]
  max_attempts: [1, 3, 5]

metrics:
  primary:
    - success_rate
    - formal_conformance
    - mutation_kill_rate
  secondary:
    - pattern_violations
    - llm_calls
    - latency_ms

statistical_tests:
  - name: M_vs_B1
    baseline: B1
    method: M
    test: wilcoxon
    alpha: 0.05
  - name: M_vs_B2
    baseline: B2
    method: M
    test: wilcoxon
    alpha: 0.05
